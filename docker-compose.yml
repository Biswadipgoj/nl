version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      # Populate these at deploy time (do NOT commit real credentials)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
